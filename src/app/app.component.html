<div class="app-shell">
  <nav class="navbar">
    <a class="brand" routerLink="/">
      <img class="brand-logo" src="assets/nyayasetu-official.png" alt="NyayaSetu logo" />
      <div class="brand-text">
        <span class="title">NyayaSetu</span>
      </div>
    </a>

    <div class="nav-center">
      <a class="nav-center-link" [routerLink]="['/']" fragment="constitution">Constitution</a>
      <a class="nav-center-link" [routerLink]="['/']" fragment="criminal-law">Criminal Law</a>
      <a class="nav-center-link" [routerLink]="['/']" fragment="statutes">Statutes</a>
      <a class="nav-center-link" [routerLink]="['/']" fragment="how-it-works">How it Works</a>
    </div>

    <div class="nav-actions" *ngIf="!restoringSession">
      <ng-container *ngIf="!isAuthenticated; else loggedInLinks">
        <a class="nav-link nav-outline" routerLink="/login">Login</a>
        <a class="nav-link nav-primary gold-button" routerLink="/signup">Sign Up</a>
      </ng-container>
      <ng-template #loggedInLinks>
        <a class="user-chip" routerLink="/workspace">{{ user?.name || user?.email }}</a>
        <button class="nav-link nav-outline" (click)="logout()">Logout</button>
      </ng-template>
    </div>
  </nav>

  <main class="page-body">
    <router-outlet></router-outlet>
  </main>
</div>
