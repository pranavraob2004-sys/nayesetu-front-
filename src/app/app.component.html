<div class="app-shell">

  <!-- HEADER -->
  <header class="header">
    <h1>NyayaSetu</h1>
    <h2>AI-powered Legal Q&A Assistant</h2>
    <p class="tagline">Nyaya = Justice · Setu = Bridge</p>
  </header>

  <!-- QUERY INPUT -->
  <div class="query-card">
    <textarea
      [(ngModel)]="question"
      (keydown)="onKeydown($event)"
      rows="3"
      placeholder="Ask about an Article, Part, or constitutional provision…">
    </textarea>

    <div class="actions">
      <button (click)="submit()" [disabled]="loading">
        {{ loading ? 'Thinking…' : 'Ask' }}
      </button>
      <span class="hint">Press Enter to ask · Shift+Enter for new line</span>
    </div>
  </div>

  <div class="section article" *ngIf="articleBlock">
  <div class="section-title">Article</div>
  <pre class="section-body">
{{ articleBlock }}
<span *ngIf="articleBlock.length < rawArticleText.length" class="cursor">▌</span>
  </pre>
</div>


  <div class="section full-text" *ngIf="fullTextBlock">
  <div class="section-title">Full Text</div>
  <pre class="section-body">
{{ fullTextBlock }}
<span *ngIf="fullTextBlock.length < rawFullText.length" class="cursor">▌</span>
  </pre>
</div>


  <!-- EXPLANATION -->
  <div class="section explanation" *ngIf="explanation || loading">
    <div class="section-title">Explanation</div>
    <pre class="section-body">
{{ explanation }}<span *ngIf="loading" class="cursor">▌</span>
    </pre>
  </div>

</div>
